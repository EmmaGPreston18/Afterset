<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afterset</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
<script src="https://upload-widget.cloudinary.com/latest/index.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }

  /* AUTH */
  #authView { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .auth-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; width: 100%; max-width: 400px; padding: 2.5rem; }
  .auth-logo { font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 0.4rem; }
  .auth-logo span { color: #a855f7; }
  .auth-tagline { text-align: center; color: #555; font-size: 0.85rem; margin-bottom: 2rem; }
  .auth-tabs { display: flex; background: #0f0f0f; border-radius: 8px; padding: 3px; margin-bottom: 1.5rem; }
  .auth-tab { flex: 1; text-align: center; padding: 0.5rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: #666; border: none; background: none; transition: all 0.2s; }
  .auth-tab.active { background: #a855f7; color: #fff; font-weight: 600; }
  .auth-form { display: flex; flex-direction: column; gap: 1rem; }
  .auth-form label { font-size: 0.82rem; color: #aaa; display: block; margin-bottom: 0.3rem; }
  .auth-form input { width: 100%; background: #0f0f0f; border: 1px solid #2a2a2a; color: #fff; padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.9rem; }
  .auth-form input:focus { outline: none; border-color: #a855f7; }
  .auth-submit { background: #a855f7; color: #fff; border: none; padding: 0.8rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 0.5rem; }
  .auth-submit:hover { background: #9333ea; }
  .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-error { background: #2a1010; border: 1px solid #ef444433; color: #ef4444; padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.82rem; display: none; }
  .auth-success { background: #0f2a1a; border: 1px solid #22c55e33; color: #22c55e; padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.82rem; display: none; }
  .forgot-link { text-align: right; font-size: 0.78rem; color: #555; cursor: pointer; margin-top: -0.5rem; }
  .forgot-link:hover { color: #a855f7; }

  /* RESET PASSWORD VIEW */
  #resetView { display: none; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  #resetView.active { display: flex; }

  /* APP */
  #appShell { display: none; }
  #appShell.active { display: block; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 1px solid #222; }
  .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: #a855f7; }
  .nav-right { display: flex; align-items: center; gap: 0.8rem; }
  .nav-user { font-size: 0.8rem; color: #555; }
  .nav-btn { background: #a855f7; color: #fff; border: none; padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  .profile-wrap { position: relative; }
  .profile-btn { background: #1e1e1e; border: 1px solid #333; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
  .profile-btn:hover { border-color: #a855f7; }
  .profile-menu { display: none; position: absolute; top: 44px; right: 0; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; min-width: 200px; padding: 0.5rem; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .profile-menu.open { display: block; }
  .profile-email { font-size: 0.78rem; color: #555; padding: 0.5rem 0.7rem 0.7rem; border-bottom: 1px solid #222; margin-bottom: 0.3rem; word-break: break-all; }
  .profile-menu-item { width: 100%; background: none; border: none; color: #ccc; padding: 0.55rem 0.7rem; text-align: left; cursor: pointer; border-radius: 6px; font-size: 0.85rem; }
  .profile-menu-item:hover { background: #222; color: #fff; }
  .profile-menu-item.danger:hover { background: #2a1010; color: #ef4444; }

  .view { display: none; }
  .view.active { display: block; }

  #homeView { padding: 2rem; }
  .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .home-header h2 { font-size: 1.4rem; font-weight: 700; }
  .empty-state { text-align: center; padding: 5rem 2rem; color: #555; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

  .concerts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
  .concert-card { background: #141414; border: 1px solid #222; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
  .concert-card:hover { transform: translateY(-3px); border-color: #a855f7; }
  .card-thumb { width: 100%; height: 160px; background: #1e1e1e; display: flex; align-items: center; justify-content: center; color: #444; font-size: 2rem; overflow: hidden; }
  .card-thumb img, .card-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 1rem; }
  .card-artist { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
  .card-meta { font-size: 0.8rem; color: #777; margin-bottom: 0.5rem; }
  .card-rating { color: #f59e0b; font-size: 0.85rem; }
  .card-media-count { font-size: 0.75rem; color: #555; margin-top: 0.4rem; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 1.5rem; border-bottom: 1px solid #222; }
  .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
  .close-btn { background: none; border: none; color: #777; font-size: 1.4rem; cursor: pointer; }
  .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }
  label { font-size: 0.82rem; color: #aaa; display: block; margin-bottom: 0.35rem; font-weight: 500; }
  input[type="text"], input[type="date"], textarea {
    width: 100%; background: #0f0f0f; border: 1px solid #2a2a2a; color: #fff;
    padding: 0.65rem 0.8rem; border-radius: 8px; font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s;
  }
  input:focus, textarea:focus { outline: none; border-color: #a855f7; }
  textarea { resize: vertical; min-height: 80px; }
  .star-rating { display: flex; gap: 0.3rem; }
  .star { font-size: 1.5rem; cursor: pointer; color: #333; transition: color 0.15s; }
  .star.active { color: #f59e0b; }
  .setlist-row { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; }
  .setlist-row input { flex: 1; }
  .remove-song { background: none; border: none; color: #555; font-size: 1.1rem; cursor: pointer; padding: 0 0.3rem; }
  .remove-song:hover { color: #ef4444; }
  .add-song-btn { background: none; border: 1px dashed #333; color: #777; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; width: 100%; margin-top: 0.2rem; }
  .add-song-btn:hover { border-color: #a855f7; color: #a855f7; }

  .upload-zone { border: 2px dashed #2a2a2a; border-radius: 10px; padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative; }
  .upload-zone:hover { border-color: #a855f7; }
  .upload-zone .uz-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .upload-zone p { font-size: 0.85rem; color: #666; }
  .upload-zone p span { color: #a855f7; }
  .upload-btn { background: #a855f7; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; width: 100%; }
  .upload-btn:hover { background: #9333ea; }
  .media-previews { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 0.8rem; }
  .media-thumb { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: #1a1a1a; }
  .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .media-thumb .rm-media { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.7); border: none; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .video-badge { position: absolute; bottom: 3px; left: 3px; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; }

  .submit-btn { background: #a855f7; color: #fff; border: none; padding: 0.8rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 0.5rem; }
  .submit-btn:hover { background: #9333ea; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #detailView { padding: 0; }
  .back-btn { background: rgba(0,0,0,0.6); border: none; color: #fff; padding: 0.4rem 0.9rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; margin: 1rem 0 0 1rem; display: inline-block; }
  .detail-content { padding: 1.5rem 2rem; }
  .detail-artist { font-size: 2rem; font-weight: 800; margin-bottom: 0.3rem; }
  .detail-meta { color: #777; font-size: 0.9rem; margin-bottom: 0.5rem; }
  .detail-rating { color: #f59e0b; font-size: 1rem; margin-bottom: 1.5rem; }
  .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #555; font-weight: 600; margin-bottom: 0.8rem; margin-top: 1.5rem; }
  .setlist-list { list-style: none; counter-reset: setlist; }
  .setlist-list li { counter-increment: setlist; padding: 0.5rem 0; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; color: #ccc; display: flex; gap: 0.8rem; }
  .setlist-list li::before { content: counter(setlist); color: #444; min-width: 18px; font-size: 0.8rem; margin-top: 1px; }
  .delete-show-btn { background: none; border: 1px solid #333; color: #777; padding: 0.4rem 0.9rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; margin-top: 1.5rem; display: inline-block; }
  .delete-show-btn:hover { border-color: #ef4444; color: #ef4444; }
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; }
  .media-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #1a1a1a; cursor: pointer; }
  .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
  .media-item .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); font-size: 2rem; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 0.7rem 1.4rem; border-radius: 20px; font-size: 0.85rem; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { border-color: #ef4444; color: #ef4444; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- AUTH VIEW -->
<div id="authView">
  <div class="auth-card">
    <div class="auth-logo">After<span>set</span></div>
    <div class="auth-tagline">Your personal concert archive</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="signinTab" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>

    <!-- SIGN IN -->
    <div id="signinForm" class="auth-form">
      <div>
        <label>Email</label>
        <input type="text" id="si-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')signIn()">
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="si-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()">
      </div>
      <div class="forgot-link" onclick="showForgot()">Forgot password?</div>
      <button class="auth-submit" id="siBtn" onclick="signIn()">Sign In</button>
    </div>

    <!-- SIGN UP -->
    <div id="signupForm" class="auth-form" style="display:none;">
      <div>
        <label>Email</label>
        <input type="text" id="su-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')signUp()">
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="su-password" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')signUp()">
      </div>
      <div>
        <label>Confirm Password</label>
        <input type="password" id="su-confirm" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')signUp()">
      </div>
      <button class="auth-submit" id="suBtn" onclick="signUp()">Create Account</button>
    </div>
  </div>
</div>

<!-- RESET PASSWORD VIEW -->
<div id="resetView">
  <div class="auth-card">
    <div class="auth-logo">After<span>set</span></div>
    <div class="auth-tagline" style="margin-bottom:1.5rem;">Set a new password</div>
    <div id="resetError" class="auth-error"></div>
    <div id="resetSuccess" class="auth-success"></div>
    <div class="auth-form">
      <div>
        <label>New Password</label>
        <input type="password" id="rp-password" placeholder="Min. 6 characters">
      </div>
      <div>
        <label>Confirm New Password</label>
        <input type="password" id="rp-confirm" placeholder="Re-enter password">
      </div>
      <button class="auth-submit" id="rpBtn" onclick="updatePassword()">Update Password</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <nav>
    <div class="logo">After<span>set</span></div>
    <div class="nav-right">
      <button class="nav-btn" onclick="openModal()">+ Log Show</button>
      <div class="profile-wrap">
        <button class="profile-btn" onclick="toggleProfileMenu()" id="profileBtn">👤</button>
        <div class="profile-menu" id="profileMenu">
          <div class="profile-email" id="navUser"></div>
          <button class="profile-menu-item" onclick="signOut()">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <div id="homeView" class="view active">
    <div class="home-header" style="padding: 2rem 2rem 0;">
      <h2>My Shows</h2>
      <span id="showCount" style="color:#555;font-size:0.85rem;"></span>
    </div>
    <div style="padding: 1.5rem 2rem;">
      <div id="concertsGrid" class="concerts-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="icon">🎸</div>
        <p>No shows logged yet.<br>Hit <strong>+ Log Show</strong> to get started.</p>
      </div>
    </div>
  </div>

  <div id="detailView" class="view">
    <button class="back-btn" onclick="showHome()">← Back</button>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<!-- LOG SHOW MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Log a Show</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label>Artist / Band *</label>
        <input type="text" id="f-artist" placeholder="e.g. Rufus Wainwright">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">
        <div>
          <label>Venue *</label>
          <input type="text" id="f-venue" placeholder="e.g. Royal Albert Hall">
        </div>
        <div>
          <label>Date *</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div>
        <label>Rating</label>
        <div class="star-rating" id="starRating">
          <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div>
      </div>
      <div>
        <label>Setlist</label>
        <div id="setlistContainer"></div>
        <button class="add-song-btn" onclick="addSong()">+ Add song</button>
      </div>
      <div>
        <label>Notes</label>
        <textarea id="f-notes" placeholder="How was it? Any memorable moments?"></textarea>
      </div>
      <div>
        <label>Photos & Videos</label>
        <button class="upload-btn" id="uploadBtn" onclick="openCloudinaryWidget()">📎 Choose Files to Upload</button>
        <p style="font-size:0.75rem;margin-top:0.5rem;color:#666;">Images & videos auto-compressed by Cloudinary</p>
        <div class="media-previews" id="mediaPreviews"></div>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="saveShow()">Save Show</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div id="lightboxContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://kbsyypjxawbweqjbkoop.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_QC1sjJOYPzmUGowuP-AhOw_yzOIQwNm';
  const BUCKET = 'show-media';
  const CLOUDINARY_CLOUD = 'dme1hasa1';

  let currentUser = null;
  let accessToken = null;
  let shows = [];
  let currentRating = 0;
  let pendingMedia = [];

  // ─── AUTH HELPERS ───────────────────────────────────────────
  const authApi = (path, data) => axios.post(`${SUPABASE_URL}/auth/v1/${path}`, data, {
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' }
  });

  const api = (path, opts = {}) => axios(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    }
  });

  const mediaUrl = path => `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/${path}`;

  function saveSession(session) {
    accessToken = session.access_token;
    currentUser = session.user;
    localStorage.setItem('sl_session', JSON.stringify({ access_token: session.access_token, user: session.user }));
  }

  function clearSession() {
    accessToken = null;
    currentUser = null;
    localStorage.removeItem('sl_session');
  }

  function restoreSession() {
    try {
      const s = JSON.parse(localStorage.getItem('sl_session'));
      if (s?.access_token && s?.user) { accessToken = s.access_token; currentUser = s.user; return true; }
    } catch {}
    return false;
  }

  // ─── AUTH UI ────────────────────────────────────────────────
  function switchTab(tab) {
    clearAuthMessages();
    document.getElementById('signinForm').style.display = tab === 'signin' ? 'flex' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'flex' : 'none';
    document.getElementById('signinTab').className = 'auth-tab' + (tab === 'signin' ? ' active' : '');
    document.getElementById('signupTab').className = 'auth-tab' + (tab === 'signup' ? ' active' : '');
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
  }
  function showAuthSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  }
  function clearAuthMessages() {
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
  }

  async function signIn() {
    const email = document.getElementById('si-email').value.trim();
    const pw = document.getElementById('si-password').value;
    if (!email || !pw) { showAuthError('Please enter your email and password.'); return; }
    const btn = document.getElementById('siBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
    try {
      const { data } = await authApi('token?grant_type=password', { email, password: pw });
      saveSession(data);
      enterApp();
    } catch (err) {
      showAuthError(err.response?.data?.error_description || 'Invalid email or password.');
    } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
  }

  async function signUp() {
    const email = document.getElementById('su-email').value.trim();
    const pw = document.getElementById('su-password').value;
    const confirm = document.getElementById('su-confirm').value;
    if (!email || !pw) { showAuthError('Please fill in all fields.'); return; }
    if (pw.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
    if (pw !== confirm) { showAuthError('Passwords do not match.'); return; }
    const btn = document.getElementById('suBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating account...';
    try {
      const { data } = await authApi('signup', { email, password: pw });
      if (data.session) { saveSession(data.session); enterApp(); }
      else showAuthSuccess('Account created! You can now sign in.');
    } catch (err) {
      showAuthError(err.response?.data?.msg || 'Could not create account.');
    } finally { btn.disabled = false; btn.textContent = 'Create Account'; }
  }

  async function showForgot() {
    const email = document.getElementById('si-email').value.trim();
    if (!email) { showAuthError('Enter your email above first.'); return; }
    try {
      await authApi('recover', { email });
      showAuthSuccess('Password reset email sent! Check your inbox.');
    } catch { showAuthError('Could not send reset email.'); }
  }

  async function updatePassword() {
    const pw = document.getElementById('rp-password').value;
    const confirm = document.getElementById('rp-confirm').value;
    if (pw.length < 6) { document.getElementById('resetError').textContent = 'Min. 6 characters.'; document.getElementById('resetError').style.display = 'block'; return; }
    if (pw !== confirm) { document.getElementById('resetError').textContent = 'Passwords do not match.'; document.getElementById('resetError').style.display = 'block'; return; }
    const btn = document.getElementById('rpBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Updating...';
    try {
      await axios.put(`${SUPABASE_URL}/auth/v1/user`, { password: pw }, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
      });
      document.getElementById('resetSuccess').textContent = 'Password updated! Redirecting...';
      document.getElementById('resetSuccess').style.display = 'block';
      document.getElementById('resetError').style.display = 'none';
      setTimeout(() => { document.getElementById('resetView').classList.remove('active'); enterApp(); }, 1500);
    } catch { document.getElementById('resetError').textContent = 'Error updating password.'; document.getElementById('resetError').style.display = 'block'; }
    finally { btn.disabled = false; btn.textContent = 'Update Password'; }
  }

  async function signOut() {
    try { await axios.post(`${SUPABASE_URL}/auth/v1/logout`, {}, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` } }); } catch {}
    clearSession(); shows = [];
    document.getElementById('appShell').classList.remove('active');
    document.getElementById('authView').style.display = 'flex';
    switchTab('signin');
  }

  function enterApp() {
    document.getElementById('authView').style.display = 'none';
    document.getElementById('resetView').classList.remove('active');
    document.getElementById('appShell').classList.add('active');
    document.getElementById('navUser').textContent = currentUser.email;
    loadShows();
  }

  // ─── HANDLE PASSWORD RESET LINK ─────────────────────────────
  function checkResetLink() {
    const hash = window.location.hash;
    if (hash.includes('type=recovery')) {
      const params = new URLSearchParams(hash.replace('#', '?'));
      const token = params.get('access_token');
      if (token) {
        accessToken = token;
        document.getElementById('authView').style.display = 'none';
        document.getElementById('resetView').classList.add('active');
        return true;
      }
    }
    return false;
  }

  // ─── STARS ──────────────────────────────────────────────────
  document.querySelectorAll('.star').forEach(s => {
    s.addEventListener('mouseover', () => highlightStars(+s.dataset.v));
    s.addEventListener('mouseout', () => highlightStars(currentRating));
    s.addEventListener('click', () => { currentRating = +s.dataset.v; highlightStars(currentRating); });
  });
  function highlightStars(v) {
    document.querySelectorAll('.star').forEach(s => s.classList.toggle('active', +s.dataset.v <= v));
  }

  // ─── SETLIST ────────────────────────────────────────────────
  function addSong(val = '') {
    const c = document.getElementById('setlistContainer');
    const row = document.createElement('div');
    row.className = 'setlist-row';
    row.innerHTML = `<input type="text" placeholder="Song title" value="${val}"><button class="remove-song" onclick="this.parentElement.remove()">×</button>`;
    c.appendChild(row);
  }

  // ─── CLOUDINARY UPLOAD ──────────────────────────────────────
  function openCloudinaryWidget() {
    cloudinary.openUploadWidget(
      {
        cloudName: CLOUDINARY_CLOUD,
        uploadPreset: 'afterset_unsigned',
        multiple: true,
        resourceType: 'auto',
        maxFileSize: 500000000, // 500 MB
        clientAllowedFormats: ['jpg', 'jpeg', 'png', 'gif', 'mp4', 'mov', 'webm', 'avi'],
      },
      (error, result) => {
        if (error) {
          showToast('Upload cancelled or failed', true);
          return;
        }
        if (result && result.event === 'success') {
          const file = result.info;
          const type = file.resource_type === 'video' ? 'video' : 'image';
          pendingMedia.push({
            file: { name: file.original_filename },
            url: file.secure_url,
            type: type,
            cloudinaryId: file.public_id
          });
          renderPreviews();
          showToast(`"${file.original_filename}" uploaded!`);
        }
      }
    );
  }

  function renderPreviews() {
    const c = document.getElementById('mediaPreviews');
    c.innerHTML = '';
    pendingMedia.forEach((m, i) => {
      const div = document.createElement('div');
      div.className = 'media-thumb';
      div.innerHTML = (m.type === 'video'
        ? `<video src="${m.url}" muted playsinline></video><span class="video-badge">▶ video</span>`
        : `<img src="${m.url}" alt="">`)
        + `<button class="rm-media" onclick="removeMedia(${i})">×</button>`;
      c.appendChild(div);
    });
  }

  function removeMedia(i) { pendingMedia.splice(i, 1); renderPreviews(); }

  // ─── MODAL ──────────────────────────────────────────────────
  function openModal() { document.getElementById('modalOverlay').classList.add('open'); document.getElementById('f-date').valueAsDate = new Date(); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); resetForm(); }
  function resetForm() {
    ['f-artist','f-venue','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-date').value = '';
    document.getElementById('setlistContainer').innerHTML = '';
    document.getElementById('mediaPreviews').innerHTML = '';
    pendingMedia = []; currentRating = 0; highlightStars(0);
  }

  // ─── TOAST ──────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  // ─── SAVE SHOW ──────────────────────────────────────────────
  async function saveShow() {
    const artist = document.getElementById('f-artist').value.trim();
    const venue = document.getElementById('f-venue').value.trim();
    const date = document.getElementById('f-date').value;
    if (!artist) { showToast('Please enter at least an artist name.', true); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving...';
    try {
      const setlist = [...document.querySelectorAll('#setlistContainer input')].map(i => i.value.trim()).filter(Boolean);
      const { data } = await api('shows', {
        method: 'POST',
        data: { artist, venue: venue || null, date: date || null, rating: currentRating || null, setlist, notes: document.getElementById('f-notes').value.trim() || null, user_id: currentUser.id }
      });
      const show = data[0];
      const uploadedPaths = [];
      for (const m of pendingMedia) {
        uploadedPaths.push({ path: m.cloudinaryId, type: m.type, url: m.url });
      }
      if (uploadedPaths.length) {
        await api(`shows?id=eq.${show.id}`, { method: 'PATCH', data: { media: uploadedPaths } });
        show.media = uploadedPaths;
      } else { show.media = []; }
      shows.unshift(show);
      renderGrid();
      closeModal();
      showToast('Show saved! 🎉');
    } catch (err) {
      console.error(err);
      showToast('Error saving show.', true);
    } finally { btn.disabled = false; btn.textContent = 'Save Show'; }
  }

  // ─── LOAD & RENDER ──────────────────────────────────────────
  async function loadShows() {
    renderSkeletons();
    try {
      const { data } = await api(`shows?user_id=eq.${currentUser.id}&order=date.desc&select=*`);
      shows = data || [];
      renderGrid();
    } catch (err) {
      console.error(err);
      showToast('Could not load shows.', true);
      document.getElementById('concertsGrid').innerHTML = '';
      document.getElementById('emptyState').style.display = 'block';
    }
  }

  function renderSkeletons() {
    const grid = document.getElementById('concertsGrid');
    grid.innerHTML = [1,2,3].map(() => `
      <div class="concert-card" style="pointer-events:none;">
        <div class="card-thumb skeleton"></div>
        <div class="card-body">
          <div class="skeleton" style="height:16px;width:60%;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:12px;width:40%;"></div>
        </div>
      </div>`).join('');
    document.getElementById('emptyState').style.display = 'none';
  }

  function renderGrid() {
    const grid = document.getElementById('concertsGrid');
    const empty = document.getElementById('emptyState');
    document.getElementById('showCount').textContent = shows.length ? `${shows.length} show${shows.length > 1 ? 's' : ''}` : '';
    if (!shows.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none'; grid.innerHTML = '';
    shows.forEach(s => {
      const media = s.media || [];
      const first = media[0];
      let thumb = `<div class="card-thumb">🎤</div>`;
      if (first) {
        const url = first.url || mediaUrl(first.path);
        thumb = first.type === 'video'
          ? `<div class="card-thumb"><video src="${url}" muted></video></div>`
          : `<div class="card-thumb"><img src="${url}" alt=""></div>`;
      }
      const stars = s.rating ? '★'.repeat(s.rating) + '☆'.repeat(5 - s.rating) : '';
      const card = document.createElement('div');
      card.className = 'concert-card';
      card.innerHTML = `${thumb}
        <div class="card-body">
          <div class="card-artist">${s.artist}</div>
          <div class="card-meta">${s.venue} · ${formatDate(s.date)}</div>
          ${stars ? `<div class="card-rating">${stars}</div>` : ''}
          <div class="card-media-count">📎 ${media.length ? `${media.length} file${media.length > 1 ? 's' : ''}` : 'No media'}</div>
        </div>`;
      card.onclick = () => showDetail(s.id);
      grid.appendChild(card);
    });
  }

  // ─── DETAIL ─────────────────────────────────────────────────
  function showDetail(id) {
    const s = shows.find(x => x.id === id);
    if (!s) return;
    const media = s.media || [];
    const stars = s.rating ? '★'.repeat(s.rating) + '☆'.repeat(5 - s.rating) : 'No rating';
    const setlistHTML = (s.setlist || []).length
      ? `<p class="section-title">Setlist</p><ul class="setlist-list">${s.setlist.map(t => `<li>${t}</li>`).join('')}</ul>` : '';
    const notesHTML = s.notes ? `<p class="section-title">Notes</p><p class="notes-text">${s.notes}</p>` : '';
    const mediaHTML = media.length ? `
      <p class="section-title">Photos & Videos (${media.length})</p>
      <div class="media-grid">
        ${media.map((m, i) => {
          const url = m.url || mediaUrl(m.path);
          return m.type === 'video'
            ? `<div class="media-item" onclick="openLightbox('${id}',${i})"><video src="${url}" muted></video><div class="play-icon">▶</div></div>`
            : `<div class="media-item" onclick="openLightbox('${id}',${i})"><img src="${url}" alt=""></div>`;
        }).join('')}
      </div>` : '<p class="section-title" style="margin-top:1.5rem;">No media uploaded</p>';
    document.getElementById('detailContent').innerHTML = `
      <div class="detail-artist">${s.artist}</div>
      <div class="detail-meta">${s.venue ? s.venue : ''}${s.venue && s.date ? ' · ' : ''}${s.date ? formatDate(s.date) : ''}</div>
      <div class="detail-rating">${stars}</div>
      ${setlistHTML}${notesHTML}${mediaHTML}
      <button class="delete-show-btn" onclick="deleteShow('${s.id}')">🗑 Delete show</button>`;
    document.getElementById('homeView').classList.remove('active');
    document.getElementById('detailView').classList.add('active');
  }

  function showHome() {
    document.getElementById('detailView').classList.remove('active');
    document.getElementById('homeView').classList.add('active');
  }

  async function deleteShow(id) {
    if (!confirm('Are you sure you want to delete this show?')) return;
    try {
      await api(`shows?id=eq.${id}`, { method: 'DELETE' });
      shows = shows.filter(s => s.id !== id);
      renderGrid();
      showHome();
      showToast('Show deleted.');
    } catch (err) {
      console.error(err);
      showToast('Error deleting show.', true);
    }
  }

  function toggleProfileMenu() {
    document.getElementById('profileMenu').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    const wrap = document.querySelector('.profile-wrap');
    if (wrap && !wrap.contains(e.target)) document.getElementById('profileMenu').classList.remove('open');
  });

  // ─── LIGHTBOX ───────────────────────────────────────────────
  function openLightbox(showId, idx) {
    const s = shows.find(x => x.id === showId);
    const m = s.media[idx];
    const url = m.url || mediaUrl(m.path);
    document.getElementById('lightboxContent').innerHTML = m.type === 'video'
      ? `<video src="${url}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px;"></video>`
      : `<img src="${url}" alt="" style="max-width:90vw;max-height:90vh;border-radius:8px;">`;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxContent').innerHTML = '';
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return new Date(y, m - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ─── INIT ───────────────────────────────────────────────────
  if (!checkResetLink()) {
    if (restoreSession()) enterApp();
    else document.getElementById('authView').style.display = 'flex';
  }
</script>
</body>
</html>
